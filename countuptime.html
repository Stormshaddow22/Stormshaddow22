<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 10px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: transparent; /* Makes it blend with your dashboard wallpaper */
            color: white; /* Matches your request for white text */
            text-align: center;
            overflow: hidden;
        }

        .main-counter {
            font-size: 8rem; /* Large days display like your reference */
            font-weight: 600;
            line-height: 1;
            margin: 0;
        }

        .days-label {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            max-width: 500px;
            margin: 0 auto;
        }

        .stat-box div:first-child {
            font-size: 2.5rem;
            font-weight: 400;
        }

        .stat-label {
            font-size: 1rem;
            opacity: 0.7;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <div class="main-counter" id="days">0</div>
    <div class="days-label">days</div>

    <div class="stats">
        <div class="stat-box">
            <div id="hours">0</div>
            <div class="stat-label">hours</div>
        </div>
        <div class="stat-box">
            <div id="minutes">0</div>
            <div class="stat-label">minutes<br>since</div>
        </div>
        <div class="stat-box">
            <div id="seconds">0</div>
            <div class="stat-label">seconds</div>
        </div>
    </div>

    <script>
        function updateCounter() {
            const startDate = new Date("July 6, 2025 00:00:00").getTime();
            const now = new Date().getTime();
            const distance = now - startDate;

            if (distance > 0) {
                document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
                document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);
            }
        }

        setInterval(updateCounter, 1000);
        updateCounter();
    </script>
</body>
</html>
