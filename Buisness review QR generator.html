<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Google Maps Place Finder + QR Code</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      #map {
        height: 60vh;
        width: 100%;
      }

      #pac-input {
        margin: 10px;
        padding: 10px;
        width: 400px;
        font-size: 16px;
      }

      #info {
        margin: 15px;
        font-family: Arial, sans-serif;
      }

      #qrCode {
        margin-top: 20px;
      }

      .button-container {
        margin-top: 10px;
      }

      button {
        padding: 10px 15px;
        font-size: 14px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background: #45a049;
      }
    </style>
  </head>
  <body>
    <!-- Search box -->
    <input
      id="pac-input"
      class="controls"
      type="text"
      placeholder="Search for a place"
    />

    <!-- Map -->
    <div id="map"></div>

    <!-- Place info -->
    <div id="info">
      <p><b>Name:</b> <span id="place-name"></span></p>
      <p><b>Place ID:</b> <span id="place-id"></span></p>
      <p><b>Address:</b> <span id="place-address"></span></p>
      <p><b>Review Link:</b> <span id="review-link"></span></p>
    </div>

    <!-- QR Code Section -->
    <div id="qrCode"></div>
    <div class="button-container">
      <button onclick="generateQRCode()">Generate QR Code</button>
      <button onclick="downloadQRCode()">Download QR Code</button>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
      let map, marker, infowindow;

      function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
          center: { lat: -33.8688, lng: 151.2195 }, // Sydney default
          zoom: 13,
        });

        const input = document.getElementById("pac-input");
        const autocomplete = new google.maps.places.Autocomplete(input, {
          fields: ["place_id", "geometry", "formatted_address", "name"],
        });

        autocomplete.bindTo("bounds", map);

        infowindow = new google.maps.InfoWindow();
        marker = new google.maps.Marker({
          map,
          anchorPoint: new google.maps.Point(0, -29),
        });

        autocomplete.addListener("place_changed", () => {
          infowindow.close();
          marker.setVisible(false);

          const place = autocomplete.getPlace();
          if (!place.geometry || !place.geometry.location) {
            alert("No details available for input: '" + place.name + "'");
            return;
          }

          // Zoom/center
          if (place.geometry.viewport) {
            map.fitBounds(place.geometry.viewport);
          } else {
            map.setCenter(place.geometry.location);
            map.setZoom(17);
          }

          // Marker
          marker.setPosition(place.geometry.location);
          marker.setVisible(true);

          // Info
          document.getElementById("place-name").textContent = place.name;
          document.getElementById("place-id").textContent = place.place_id;
          document.getElementById("place-address").textContent =
            place.formatted_address;

          // Create review link
          const reviewLink = `https://search.google.com/local/writereview?placeid=${place.place_id}`;
          document.getElementById(
            "review-link"
          ).innerHTML = `<a href="${reviewLink}" target="_blank">${reviewLink}</a>`;

          // Auto-generate QR code
          document.getElementById("qrCode").innerHTML = "";
          new QRCode(document.getElementById("qrCode"), reviewLink);

          // InfoWindow
          infowindow.setContent(
            `<div><strong>${place.name}</strong><br>${place.formatted_address}<br>Place ID: ${place.place_id}</div>`
          );
          infowindow.open(map, marker);
        });
      }

      // Manual QR code generation (rebuilds)
      function generateQRCode() {
        const placeId = document.getElementById("place-id").textContent;
        if (!placeId) {
          alert("Please search for a place first!");
          return;
        }
        const reviewLink = `https://search.google.com/local/writereview?placeid=${placeId}`;
        document.getElementById("qrCode").innerHTML = "";
        new QRCode(document.getElementById("qrCode"), reviewLink);
      }

      // Download QR code
      function downloadQRCode() {
        const qrCanvas = document.querySelector("#qrCode canvas");
        if (!qrCanvas) {
          alert("Generate the QR code first!");
          return;
        }
        const link = document.createElement("a");
        link.href = qrCanvas.toDataURL("image/png");
        link.download = "review-qr.png";
        link.click();
      }

      window.initMap = initMap;
    </script>

    <!-- Google Maps JS API with Places -->
    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB41DRUbKWJHPxaFjMAwdrzWzbVKartNGg&callback=initMap&libraries=places&v=weekly"
      defer
    ></script>
  </body>
</html>
